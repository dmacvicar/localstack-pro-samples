openspec: "1.0"
name: localstack-pro-samples-ci
description: CI/CD pipeline for testing AWS samples against LocalStack Pro
version: "0.1.0"

repository:
  url: https://github.com/localstack-samples/localstack-pro-samples
  branch: master

environment:
  localstack:
    image: localstack/localstack-pro:latest
    services:
      - acm
      - apigateway
      - cloudformation
      - cloudwatch
      - config
      - dynamodb
      - dynamodbstreams
      - ec2
      - es
      - events
      - firehose
      - iam
      - kinesis
      - kms
      - lambda
      - logs
      - opensearch
      - redshift
      - resource-groups
      - route53
      - s3
      - secretsmanager
      - ses
      - sns
      - sqs
      - ssm
      - stepfunctions
      - sts
      - swf
      - transcribe

  tools:
    - name: awslocal
      wrapper: bin/awslocal
      backend: "uvx --with awscli --from awscli-local awslocal"
    - name: cdklocal
      package: aws-cdk-local
    - name: tflocal
      package: terraform-local

samples:
  # Passing samples (verified)
  - name: lambda-function-urls-python
    path: lambda-function-urls-python
    status: passing
    services: [lambda]
    command: make install && make run

  - name: stepfunctions-lambda
    path: stepfunctions-lambda
    status: passing
    services: [lambda, stepfunctions, iam]
    command: make install && make create-lambdas

  # Partial success (deploys but has issues)
  - name: elb-load-balancing
    path: elb-load-balancing
    status: partial
    services: [ec2, elb, lambda, s3]
    command: make install && make run
    notes: "Deploys successfully but Lambda invocations via ELB return S3 NoSuchBucket errors"

  # Needs fixes (uses unavailable services)
  - name: terraform-resources
    path: terraform-resources
    status: needs_fix
    services: [s3, apigateway, iam, lambda, elasticache, rds]
    command: make install && make run
    notes: "Uses ElastiCache and RDS which are not in license. S3 bucket creation also fails."

  # Skipped - apigatewayv2 not in license
  - name: apigw-custom-domain
    path: apigw-custom-domain
    status: skipped
    skip_reason: "apigatewayv2 not in license"
    services: [apigateway, apigatewayv2, lambda, route53, acm]

  - name: serverless-websockets
    path: serverless-websockets
    status: skipped
    skip_reason: "apigatewayv2 not in license"
    services: [apigatewayv2, lambda]

  # Skipped - ECR not in license
  - name: lambda-container-image
    path: lambda-container-image
    status: skipped
    skip_reason: "ECR not in license"
    services: [lambda, ecr]

  - name: ecs-ecr-container-app
    path: ecs-ecr-container-app
    status: skipped
    skip_reason: "ECS/ECR not in license"
    services: [ecs, ecr]

  # Skipped - other services not in license
  - name: rds-db-queries
    path: rds-db-queries
    status: skipped
    skip_reason: "RDS not in license"
    services: [rds]

  - name: iot-basics
    path: iot-basics
    status: skipped
    skip_reason: "IoT not in license"
    services: [iot]

  - name: athena-s3-queries
    path: athena-s3-queries
    status: skipped
    skip_reason: "Athena not in license"
    services: [athena, s3]

  - name: glue-etl-jobs
    path: glue-etl-jobs
    status: skipped
    skip_reason: "Glue not in license"
    services: [glue, s3]

  - name: sagemaker-inference
    path: sagemaker-inference
    status: skipped
    skip_reason: "SageMaker not in license"
    services: [sagemaker]

  - name: cognito-jwt
    path: cognito-jwt
    status: skipped
    skip_reason: "Cognito not in license"
    services: [cognito, lambda]

ci:
  workflow: .github/workflows/run-samples.yml
  orchestrator: run-samples.sh
  matrix_builder: .github/scripts/build-matrix.sh

  triggers:
    - pull_request:
        branches: [main, master]
    - workflow_dispatch:
        inputs:
          mode: [changed, all]

  features:
    - dynamic_matrix_generation
    - change_detection
    - parallel_execution
    - sharding

infrastructure_files:
  - run-samples.sh
  - Makefile
  - .github/workflows/run-samples.yml
  - .github/scripts/build-matrix.sh

roadmap:
  phase1:
    name: "Foundation (Current)"
    status: complete
    tasks:
      - "[x] Create run-samples.sh orchestrator"
      - "[x] Create GitHub Actions workflow"
      - "[x] Create dynamic matrix builder"
      - "[x] Create awslocal wrapper using uvx"
      - "[x] Verify lambda-function-urls-python sample"
      - "[x] Verify stepfunctions-lambda sample"
      - "[x] Create openspec.yaml for tracking"

  phase2:
    name: "Expand Coverage"
    status: in_progress
    tasks:
      - "[x] Test apigw-custom-domain sample - BLOCKED (apigatewayv2 not in license)"
      - "[x] Test terraform-resources sample - BLOCKED (elasticache, rds not in license)"
      - "[x] Test lambda-container-image sample - BLOCKED (ecr not in license)"
      - "[x] Test elb-load-balancing sample - PARTIAL (deploys but invocation fails)"
      - "[x] Add cdklocal and tflocal wrappers to bin/"
      - "[x] Test with act locally - build-matrix job works"
      - "[ ] Find more samples using only available services"
      - "[ ] Add .gitignore for sample build artifacts"

  phase3:
    name: "Fix Broken Samples"
    status: pending
    tasks:
      - "[ ] Fix samples with missing Makefile targets"
      - "[ ] Update samples with deprecated dependencies"
      - "[ ] Add test validation scripts where missing"
      - "[ ] Document fixes for upstream PR"

  phase4:
    name: "Production Ready"
    status: pending
    tasks:
      - "[ ] Enable CI on GitHub (requires secrets)"
      - "[ ] Add nightly full test run schedule"
      - "[ ] Add coverage badge generation"
      - "[ ] PR workflow improvements to upstream"
      - "[ ] Add Slack/email notifications for failures"

next_actions:
  - priority: high
    action: "Test remaining samples with available services"
    samples:
      - apigw-custom-domain
      - terraform-resources
      - lambda-container-image
      - elb-load-balancing

  - priority: medium
    action: "Add cdklocal and tflocal wrappers to bin/"
    reason: "CDK and Terraform samples need these tools"

  - priority: medium
    action: "Test GitHub Actions workflow locally with act"
    reason: "Validate CI pipeline works before pushing to GitHub"
    notes: |
      Use nektos/act to run workflow locally:
        act -j run-samples --secret LOCALSTACK_AUTH_TOKEN=$LOCALSTACK_AUTH_TOKEN
      Start with a single sample to verify the pipeline works end-to-end.

  - priority: medium
    action: "Create sample-specific .gitignore entries"
    reason: "Prevent committing build artifacts like .venv, node_modules, *.zip"

  - priority: low
    action: "Add test result reporting"
    reason: "Generate JUnit XML for GitHub Actions test summary"

changelog:
  - version: "0.3.0"
    date: "2026-03-02"
    changes:
      - "Added cdklocal and tflocal wrappers to bin/"
      - "Added act testing item to roadmap"
      - "Tested additional samples: terraform-resources, apigw-custom-domain, lambda-container-image, elb-load-balancing"
      - "Identified license limitations: apigatewayv2, ECR, ECS, RDS, ElastiCache, IoT, Athena, Glue, SageMaker, Cognito not available"
      - "elb-load-balancing deploys but has invocation issues"
      - "Updated sample status tracking with detailed notes"

  - version: "0.2.0"
    date: "2026-03-02"
    changes:
      - "Added roadmap and next_actions sections"
      - "Defined 4-phase implementation plan"
      - "Prioritized next actions"

  - version: "0.1.0"
    date: "2026-03-02"
    changes:
      - "Initial CI pipeline setup"
      - "Created run-samples.sh orchestrator"
      - "Created GitHub Actions workflow"
      - "Created dynamic matrix builder"
      - "Created awslocal wrapper using uvx"
      - "Verified lambda-function-urls-python sample"
      - "Verified stepfunctions-lambda sample"
      - "Identified samples requiring services not in license"
