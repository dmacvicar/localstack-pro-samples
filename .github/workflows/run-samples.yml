name: Run Samples

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      samples: ${{ steps.discover.outputs.samples }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover sample × IaC combinations
        id: discover
        run: |
          # Build matrix of sample × IaC method combinations
          matrix="["
          samples="["
          first=true
          first_sample=true
          seen_samples=""

          for sample_dir in samples/*/; do
            sample=$(basename "$sample_dir")

            for lang_dir in "$sample_dir"*/; do
              [ -d "$lang_dir" ] || continue
              lang=$(basename "$lang_dir")

              # Track unique samples for badge generation
              sample_key="${sample}/${lang}"
              if [[ ! " $seen_samples " =~ " $sample_key " ]]; then
                $first_sample || samples+=","
                first_sample=false
                samples+="{\"sample\":\"$sample\",\"language\":\"$lang\"}"
                seen_samples="$seen_samples $sample_key"
              fi

              # Check for scripts deploy
              if [ -f "$lang_dir/scripts/deploy.sh" ]; then
                $first || matrix+=","
                first=false
                matrix+="{\"sample\":\"$sample\",\"language\":\"$lang\",\"iac\":\"scripts\"}"
              fi

              # Check for IaC methods
              for iac in terraform cloudformation cdk; do
                if [ -f "$lang_dir/$iac/deploy.sh" ]; then
                  $first || matrix+=","
                  first=false
                  matrix+="{\"sample\":\"$sample\",\"language\":\"$lang\",\"iac\":\"$iac\"}"
                fi
              done
            done
          done

          matrix+="]"
          samples+="]"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "samples=$samples" >> $GITHUB_OUTPUT
          echo "Discovered tests: $matrix"

  test:
    name: ${{ matrix.sample }}/${{ matrix.language }} (${{ matrix.iac }})
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip unzip curl

      - name: Install Terraform
        if: matrix.iac == 'terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'
          terraform_wrapper: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install AWS CLI and LocalStack tools
        run: |
          uv tool install awscli
          uv tool install 'awscli-local==0.21'
          uv tool install terraform-local
          uv tool install chalice
          uv tool install chalice-local

      - name: Install CDK
        if: matrix.iac == 'cdk'
        run: npm install -g aws-cdk-local aws-cdk

      - name: Install test dependencies
        run: uv sync

      - name: Install CDK Python dependencies
        if: matrix.iac == 'cdk'
        run: |
          cd "samples/${{ matrix.sample }}/${{ matrix.language }}/cdk"
          if [ -f requirements.txt ]; then
            uv pip install -r requirements.txt
          fi

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Free disk space
        run: |
          docker system prune -af --volumes || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost || true

      - name: Pull LocalStack image
        run: docker pull localstack/localstack-pro:latest

      - name: Start LocalStack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          # Sample-specific environment variables
          EXTRA_ENV=""
          if [ "${{ matrix.sample }}" = "ec2-docker-instances" ]; then
            EXTRA_ENV="-e EC2_VM_MANAGER=docker"
          fi
          if [ "${{ matrix.sample }}" = "iam-policy-enforcement" ]; then
            EXTRA_ENV="-e ENFORCE_IAM=1"
          fi

          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -p 4510-4559:4510-4559 \
            -e LOCALSTACK_AUTH_TOKEN \
            -e DEBUG=1 \
            $EXTRA_ENV \
            -v /var/run/docker.sock:/var/run/docker.sock \
            localstack/localstack-pro:latest

          echo "Waiting for LocalStack..."
          timeout 60 bash -c 'until curl -s http://localhost:4566/_localstack/health | jq -e ".services" > /dev/null 2>&1; do sleep 2; done'
          echo "LocalStack is ready!"

      - name: Run tests for ${{ matrix.sample }} (${{ matrix.iac }})
        id: test
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          # Sample-specific test environment
          EC2_DOCKER_ENABLED: ${{ matrix.sample == 'ec2-docker-instances' && 'true' || '' }}
          ENFORCE_IAM_ENABLED: ${{ matrix.sample == 'iam-policy-enforcement' && 'true' || '' }}
        run: |
          sample_dir="samples/${{ matrix.sample }}"
          lang_dir="$sample_dir/${{ matrix.language }}"
          result_file="test-results-${{ matrix.sample }}-${{ matrix.language }}-${{ matrix.iac }}.json"

          # Check for language-specific test first, then shared test
          if ls "$lang_dir"/test_*.py 1>/dev/null 2>&1; then
            test_path="$lang_dir/"
            # Language-specific test: filter by IaC method only
            uv run pytest "$test_path" -v --tb=short -k "${{ matrix.iac }}" \
              --json-report --json-report-file="$result_file" || true
          elif ls "$sample_dir"/test_*.py 1>/dev/null 2>&1; then
            test_path="$sample_dir/"
            # Shared test: filter by both language and IaC method
            uv run pytest "$test_path" -v --tb=short -k "${{ matrix.language }} and ${{ matrix.iac }}" \
              --json-report --json-report-file="$result_file" || true
          else
            echo "No test file found for ${{ matrix.sample }}/${{ matrix.language }}"
            echo '{"summary": {"passed": 0, "failed": 0, "total": 0, "error": "no tests found"}}' > "$result_file"
          fi

          # Extract test counts
          if [ -f "$result_file" ]; then
            passed=$(jq -r '.summary.passed // 0' "$result_file")
            failed=$(jq -r '.summary.failed // 0' "$result_file")
            total=$(jq -r '.summary.total // 0' "$result_file")
            echo "passed=$passed" >> $GITHUB_OUTPUT
            echo "failed=$failed" >> $GITHUB_OUTPUT
            echo "total=$total" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.sample }}-${{ matrix.language }}-${{ matrix.iac }}
          path: test-results-*.json
          retention-days: 7

      - name: Capture LocalStack logs
        if: failure()
        run: |
          docker logs localstack > localstack.log 2>&1 || true
          echo "=== LocalStack Logs (last 100 lines) ==="
          tail -100 localstack.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.sample }}-${{ matrix.language }}-${{ matrix.iac }}
          path: localstack.log
          retention-days: 7

      - name: Check test results
        run: |
          # Fail the job if tests failed
          if [ "${{ steps.test.outputs.failed }}" != "0" ] && [ "${{ steps.test.outputs.failed }}" != "" ]; then
            echo "Tests failed: ${{ steps.test.outputs.failed }} failures"
            exit 1
          fi

  aggregate-results:
    name: Aggregate test results
    needs: [discover, test]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: results
          merge-multiple: true

      - name: Aggregate results and create badges
        run: |
          mkdir -p badges

          # Create a JSON file for each sample with aggregated results
          echo '{}' > badges/all-results.json

          for result_file in results/test-results-*.json; do
            [ -f "$result_file" ] || continue

            # Extract sample, language, iac from filename
            filename=$(basename "$result_file" .json)
            # Format: test-results-{sample}-{language}-{iac}
            sample=$(echo "$filename" | sed 's/test-results-//' | rev | cut -d'-' -f3- | rev)
            language=$(echo "$filename" | rev | cut -d'-' -f2 | rev)
            iac=$(echo "$filename" | rev | cut -d'-' -f1 | rev)

            passed=$(jq -r '.summary.passed // 0' "$result_file")
            failed=$(jq -r '.summary.failed // 0' "$result_file")
            total=$(jq -r '.summary.total // 0' "$result_file")

            # Create shields.io endpoint badge JSON for this sample/language combo
            key="${sample}-${language}"
            badge_file="badges/${key}.json"

            # Accumulate results for this sample
            if [ -f "$badge_file" ]; then
              current_passed=$(jq -r '.passed' "$badge_file")
              current_failed=$(jq -r '.failed' "$badge_file")
              current_total=$(jq -r '.total' "$badge_file")
              passed=$((current_passed + passed))
              failed=$((current_failed + failed))
              total=$((current_total + total))
            fi

            # Determine color
            if [ "$failed" -gt 0 ]; then
              color="red"
            elif [ "$total" -eq 0 ]; then
              color="lightgrey"
            else
              color="brightgreen"
            fi

            # Create badge JSON (shields.io endpoint format)
            cat > "$badge_file" << EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${passed}/${total} passed",
            "color": "${color}",
            "passed": ${passed},
            "failed": ${failed},
            "total": ${total}
          }
          EOF

            echo "Created badge for $key: ${passed}/${total} passed"
          done

          # Combine all results into one file
          echo '{' > badges/all-results.json
          first=true
          for badge_file in badges/*.json; do
            [ "$badge_file" = "badges/all-results.json" ] && continue
            [ -f "$badge_file" ] || continue

            key=$(basename "$badge_file" .json)
            $first || echo ',' >> badges/all-results.json
            first=false
            echo "\"$key\": $(cat "$badge_file")" >> badges/all-results.json
          done
          echo '}' >> badges/all-results.json

          echo "=== All Results ==="
          cat badges/all-results.json

      - name: Update Gist with badge data
        if: env.GIST_TOKEN != ''
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.TEST_BADGES_GIST_ID }}
        run: |
          # Update the gist with all badge files
          for badge_file in badges/*.json; do
            [ -f "$badge_file" ] || continue
            filename=$(basename "$badge_file")

            # Escape JSON content for the API
            content=$(jq -c '.' "$badge_file" | jq -Rs '.')

            curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/gists/$GIST_ID" \
              -d "{\"files\":{\"$filename\":{\"content\":$(cat "$badge_file" | jq -Rs '.')}}}"

            echo "Updated gist file: $filename"
          done
