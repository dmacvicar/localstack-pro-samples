name: Run Samples

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode: all or changed'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - changed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_RUN_MODE: 'changed'

jobs:
  setup:
    name: Build Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tests: ${{ steps.set-matrix.outputs.has_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build matrix
        id: set-matrix
        env:
          RUN_MODE: ${{ github.event.inputs.run_mode || env.DEFAULT_RUN_MODE }}
        run: |
          matrix=$(.github/scripts/build-matrix.sh)
          echo "Matrix: $matrix"

          # Check if matrix is empty
          if [[ "$matrix" == "[]" ]] || [[ -z "$matrix" ]]; then
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT
          fi

  test:
    name: 'Test: ${{ matrix.name }}'
    needs: setup
    if: needs.setup.outputs.has_tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip unzip curl

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install AWS CLI and awslocal
        run: |
          uv tool install awscli
          uv tool install awscli-local
          aws --version
          awslocal --version

      - name: Install test dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements-dev.txt

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Free disk space
        run: |
          docker system prune -af --volumes || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost || true

      - name: Pull LocalStack image
        run: docker pull localstack/localstack-pro:latest

      - name: Start LocalStack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -p 4510-4559:4510-4559 \
            -e LOCALSTACK_AUTH_TOKEN \
            -e DEBUG=1 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            localstack/localstack-pro:latest

          # Wait for LocalStack to be ready
          echo "Waiting for LocalStack..."
          timeout 60 bash -c 'until curl -s http://localhost:4566/_localstack/health | jq -e ".services" > /dev/null 2>&1; do sleep 2; done'
          echo "LocalStack is ready!"

      - name: Run test
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          ./run-samples.sh SHARD=${{ matrix.shard }} SPLITS=${{ matrix.splits }}

      - name: Capture LocalStack logs
        if: always()
        run: |
          docker logs localstack > localstack.log 2>&1 || true
          echo "=== LocalStack Logs (last 100 lines) ==="
          tail -100 localstack.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: localstack-logs-${{ matrix.name }}
          path: localstack.log
          retention-days: 7

  summary:
    name: Test Summary
    needs: [setup, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.setup.outputs.has_tests }}" == "false" ]]; then
            echo "No tests were run (no matching changes found)"
            exit 0
          fi

          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Some tests failed"
            exit 1
          fi

          echo "All tests passed!"
