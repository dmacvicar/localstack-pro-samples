name: Run Samples

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover sample × IaC combinations
        id: discover
        run: |
          # Build matrix of sample × IaC method combinations
          matrix="["
          first=true

          for sample_dir in samples/*/; do
            sample=$(basename "$sample_dir")

            for lang_dir in "$sample_dir"*/; do
              [ -d "$lang_dir" ] || continue
              lang=$(basename "$lang_dir")

              # Check for scripts deploy
              if [ -f "$lang_dir/scripts/deploy.sh" ]; then
                $first || matrix+=","
                first=false
                matrix+="{\"sample\":\"$sample\",\"language\":\"$lang\",\"iac\":\"scripts\"}"
              fi

              # Check for IaC methods
              for iac in terraform cloudformation cdk; do
                if [ -f "$lang_dir/$iac/deploy.sh" ]; then
                  $first || matrix+=","
                  first=false
                  matrix+="{\"sample\":\"$sample\",\"language\":\"$lang\",\"iac\":\"$iac\"}"
                fi
              done
            done
          done

          matrix+="]"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Discovered tests: $matrix"

  test:
    name: ${{ matrix.sample }}/${{ matrix.language }} (${{ matrix.iac }})
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip unzip curl

      - name: Install Terraform
        if: matrix.iac == 'terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'
          terraform_wrapper: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install AWS CLI and LocalStack tools
        run: |
          uv tool install awscli
          uv tool install 'awscli-local==0.21'
          uv tool install terraform-local

      - name: Install CDK
        if: matrix.iac == 'cdk'
        run: npm install -g aws-cdk-local aws-cdk

      - name: Install test dependencies
        run: uv sync

      - name: Install CDK Python dependencies
        if: matrix.iac == 'cdk'
        run: |
          cd "samples/${{ matrix.sample }}/${{ matrix.language }}/cdk"
          if [ -f requirements.txt ]; then
            uv pip install -r requirements.txt
          fi

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Free disk space
        run: |
          docker system prune -af --volumes || true
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost || true

      - name: Pull LocalStack image
        run: docker pull localstack/localstack-pro:latest

      - name: Start LocalStack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -p 4510-4559:4510-4559 \
            -e LOCALSTACK_AUTH_TOKEN \
            -e DEBUG=1 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            localstack/localstack-pro:latest

          echo "Waiting for LocalStack..."
          timeout 60 bash -c 'until curl -s http://localhost:4566/_localstack/health | jq -e ".services" > /dev/null 2>&1; do sleep 2; done'
          echo "LocalStack is ready!"

      - name: Run tests for ${{ matrix.sample }} (${{ matrix.iac }})
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          sample_dir="samples/${{ matrix.sample }}"
          lang_dir="$sample_dir/${{ matrix.language }}"

          # Check for language-specific test first, then shared test
          if ls "$lang_dir"/test_*.py 1>/dev/null 2>&1; then
            test_path="$lang_dir/"
            # Language-specific test: filter by IaC method only
            uv run pytest "$test_path" -v --tb=short -k "${{ matrix.iac }}"
          elif ls "$sample_dir"/test_*.py 1>/dev/null 2>&1; then
            test_path="$sample_dir/"
            # Shared test: filter by both language and IaC method
            uv run pytest "$test_path" -v --tb=short -k "${{ matrix.language }} and ${{ matrix.iac }}"
          else
            echo "No test file found for ${{ matrix.sample }}/${{ matrix.language }}"
            exit 1
          fi

      - name: Capture LocalStack logs
        if: failure()
        run: |
          docker logs localstack > localstack.log 2>&1 || true
          echo "=== LocalStack Logs (last 100 lines) ==="
          tail -100 localstack.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.sample }}-${{ matrix.iac }}
          path: localstack.log
          retention-days: 7
